<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой вебхук Битрикс24</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 500px; margin: 0 auto; padding: 1.5rem; }
        h1 { margin-top: 0; }
        input { width: 100%; padding: 0.5rem; margin: 0.25rem 0; box-sizing: border-box; }
        button { padding: 0.5rem 1rem; margin-top: 0.5rem; }
        .helptext { font-size: 0.875rem; color: #666; }
        a { color: #0d6efd; }
    </style>
</head>
<body>
    <h1>Мой вебхук Битрикс24</h1>
    <p>У каждого пользователя — один вебхук. Укажите ссылку из портала Битрикс24 (REST → входящий вебхук).</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Сохранить</button>
    </form>
    <p><a href="{% url 'my_tasks' %}">Назад к заданиям</a></p>
</body>
</html>
