<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналитика DeepSeek по звонкам</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1.5rem; }
        h1 { margin-top: 0; }
        textarea { width: 100%; box-sizing: border-box; font-family: inherit; }
        button { padding: 0.5rem 1rem; margin-top: 0.5rem; }
        .result { white-space: pre-wrap; background: #f8f9fa; padding: 1rem; border-radius: 6px; margin-top: 1rem; }
        .meta { font-size: 0.9rem; color: #666; margin-bottom: 0.75rem; }
        a { color: #0d6efd; }
    </style>
</head>
<body>
    <h1>Аналитика DeepSeek по звонкам</h1>
    <p class="meta">
        На этой странице вы можете задать произвольный вопрос, а DeepSeek ответит на основе ваших транскрипций звонков.
    </p>
    <p>
        <a href="{% url 'home' %}">На главную</a> ·
        <a href="{% url 'my_tasks' %}">Мои задания</a> ·
        <a href="{% url 'contact_list' %}">Мои клиенты</a> ·
        <a href="{% url 'logout' %}">Выйти</a>
    </p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Отправить запрос</button>
    </form>

    {% if result %}
        <h2>Ответ DeepSeek</h2>
        <div class="result">{{ result }}</div>
    {% endif %}
</body>
</html>
