<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 400px; margin: 2rem auto; padding: 1.5rem; }
        h1 { margin-top: 0; }
        input { width: 100%; padding: 0.5rem; margin: 0.25rem 0; box-sizing: border-box; }
        button { padding: 0.5rem 1rem; margin-top: 0.5rem; }
        .errorlist { color: #c00; font-size: 0.875rem; }
        a { color: #0d6efd; }
    </style>
</head>
<body>
    <h1>Регистрация</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Зарегистрироваться</button>
    </form>
    <p><a href="{% url 'login' %}">Войти</a> · <a href="{% url 'home' %}">На главную</a></p>
</body>
</html>
